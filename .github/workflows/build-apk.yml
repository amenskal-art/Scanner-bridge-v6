name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate project
        id: locate
        run: |
          SETTINGS=$(find . -maxdepth 3 -name settings.gradle -not -path './.git/*' | head -n1)
          if [ -z "$SETTINGS" ]; then
            echo "ERROR: settings.gradle not found anywhere. The project files did not upload."
            exit 1
          fi
          DIR=$(dirname "$SETTINGS")
          echo "Project found in: $DIR"
          if [ ! -f "$DIR/app/build.gradle" ]; then
            echo "ERROR: $DIR/app/build.gradle is missing. The app folder did not upload completely."
            exit 1
          fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Warm up JitPack (trigger and wait for artifact builds)
        run: |
          BASE="https://jitpack.io/com/github/jiangdongguo/AndroidUSBCamera"
          V="3.3.3"
          for MOD in libausbc libuvc libnative libuvccommon; do
            for ATTEMPT in 1 2 3 4 5 6; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$BASE/$MOD/$V/$MOD-$V.pom" || echo 000)
              echo "$MOD attempt $ATTEMPT -> HTTP $CODE"
              if [ "$CODE" = "200" ]; then break; fi
              sleep 25
            done
          done
          echo "Warm-up done (404s above are OK if a later attempt shows 200)."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK (with retries)
        working-directory: ${{ steps.locate.outputs.dir }}
        run: |
          if gradle assembleDebug --no-daemon --stacktrace; then exit 0; fi
          for ATTEMPT in 2 3; do
            echo "Build failed — waiting 90s for JitPack, then retry $ATTEMPT with fresh dependencies..."
            sleep 90
            if gradle assembleDebug --no-daemon --stacktrace --refresh-dependencies; then exit 0; fi
          done
          echo "All attempts failed. If the error is still 'Could not find ... libuvc', open"
          echo "https://jitpack.io/#jiangdongguo/AndroidUSBCamera/3.3.3 in a browser, click 'Get it'"
          echo "next to 3.3.3, wait for the green build log, then re-run this workflow."
          exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UVC-Cam-Pro-debug-apk
          path: ${{ steps.locate.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
